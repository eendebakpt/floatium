name: wheels

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
  schedule:
    - cron: "0 6 * * 1"     # nightly sanity build

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-sdist:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with: { python-version: "3.12" }
      - run: |
          python -m pip install --upgrade pip build
          python -m build --sdist --outdir dist
      - uses: actions/upload-artifact@v5
        with:
          name: sdist
          path: dist/*.tar.gz

  build-wheels:
    name: wheels / ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
          - os: ubuntu-24.04-arm
          - os: macos-14      # arm64
          - os: windows-latest
    steps:
      - uses: actions/checkout@v5

      - uses: pypa/cibuildwheel@v3.4.1
        env:
          # Keep most config in pyproject.toml. CIBW_ENABLE opts into the
          # interpreter families that are off by default: free-threaded
          # builds (cp31Xt) and not-yet-final CPython (3.15). cibuildwheel
          # 3.x replaces the old CIBW_FREE_THREADED_SUPPORT /
          # CIBW_PRERELEASE_PYTHONS flags with this single knob, and — unlike
          # 2.21 — ships interpreter configs for CPython 3.14 / 3.15 so the
          # cp314-*/cp315-* entries in pyproject's build list resolve.
          CIBW_BUILD_VERBOSITY: 1
          CIBW_ENABLE: "cpython-freethreading cpython-prerelease"

      - uses: actions/upload-artifact@v5
        with:
          name: wheels-${{ matrix.os }}
          path: wheelhouse/*.whl

  publish:
    name: publish to PyPI
    needs: [build-wheels, build-sdist]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/project/floatium
    permissions:
      id-token: write         # trusted-publisher flow
    steps:
      - uses: actions/download-artifact@v5
        with:
          path: dist
          pattern: "{wheels-*,sdist}"
          merge-multiple: true
      - name: List artifacts
        run: ls -la dist/
      - uses: pypa/gh-action-pypi-publish@release/v1
